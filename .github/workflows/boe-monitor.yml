name: BOE Monitor — Subastas Inmuebles

on:
  schedule:
    # Hora España CEST (UTC+2): 08:00, 14:00, 22:00
    - cron: '0 6 * * *'   # 08:00 CEST
    - cron: '0 12 * * *'  # 14:00 CEST
    - cron: '0 20 * * *'  # 22:00 CEST
  workflow_dispatch:        # Permite lanzarlo manualmente desde GitHub

jobs:
  chequear:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necesario para hacer git push del estado.json

    steps:
      - name: Checkout repositorio (con estado.json)
        uses: actions/checkout@v4

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Guardar estado.json en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: actualizar estado subastas [skip ci]"
          git push
